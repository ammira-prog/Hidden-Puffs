<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Find the Hidden Mira Puffs</title>

<style>
:root{
  --ink:#2b2b2b;
  --pink:#ffc1de;
  --pink2:#ff9fcb;
}

*{ box-sizing:border-box; }
html, body{
  height:100%;
  margin:0;
  overflow:hidden;
  overscroll-behavior: none;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  color:var(--ink);
}

body{
  background:
    radial-gradient(900px 700px at 20% 15%, rgba(255,193,222,.55), transparent 60%),
    radial-gradient(900px 700px at 85% 25%, rgba(185,220,255,.55), transparent 60%),
    radial-gradient(900px 700px at 55% 90%, rgba(255,240,180,.35), transparent 60%),
    linear-gradient(135deg, #7d5cff, #b79cff 55%, #d7ccff);
}

/* HUD */
.hud{
  position:fixed;
  top:12px; left:12px; right:12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  z-index:10;
  pointer-events:none;
}
.chip{
  pointer-events:auto;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,.84);
  border:1px solid rgba(0,0,0,.08);
  border-radius:999px;
  padding:10px 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,.14);
  font-weight:900;
}
.btn{
  pointer-events:auto;
  border:none;
  border-radius:999px;
  padding:10px 14px;
  background: linear-gradient(135deg, rgba(255,193,222,.95), rgba(185,220,255,.95));
  box-shadow: 0 10px 30px rgba(0,0,0,.14);
  font-weight:950;
  cursor:pointer;
  color:#2b2b2b;
}
.btn:active{ transform: scale(.98); }

/* Title + instruction */
.header{
  position:fixed;
  top:58px; left:12px; right:12px;
  display:flex;
  justify-content:center;
  z-index:9;
  pointer-events:none;
}
.headerInner{
  text-align:center;
  padding:10px 14px;
  border-radius:18px;
  background: rgba(255,255,255,.72);
  border:1px solid rgba(0,0,0,.06);
  box-shadow: 0 10px 30px rgba(0,0,0,.12);
  max-width: 740px;
}
.title{
  font-weight:950;
  font-size:22px;
  line-height:1.1;
  white-space: nowrap;
  color:#3b1b7a;
  text-shadow:
    0 2px 0 rgba(255,255,255,.65),
    0 8px 18px rgba(0,0,0,.18);
}
.instruction{
  margin-top:6px;
  font-size:13px;
  font-weight:850;
  opacity:.84;
}

/* Horizontal-only map area */
.mapWrap{
  position:fixed;
  left:0; right:0;
  top:132px; bottom:0;
  overflow-x:auto;
  overflow-y:hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-x: contain;
  overscroll-behavior-y: none;
  touch-action: pan-x;
  padding: 14px 14px 18px;
}

/* Map */
.map{
  position:relative;
  height: calc(100vh - 170px);
  min-height: 520px;
  width: 2400px;
  border-radius: 26px;
  background:
    radial-gradient(900px 600px at 25% 30%, rgba(255,193,222,.35), transparent 60%),
    radial-gradient(900px 600px at 80% 55%, rgba(185,220,255,.35), transparent 60%),
    radial-gradient(700px 500px at 60% 90%, rgba(255,240,180,.25), transparent 60%),
    linear-gradient(135deg, rgba(255,255,255,.80), rgba(255,255,255,.55));
  border:1px solid rgba(255,255,255,.45);
  box-shadow: 0 22px 70px rgba(0,0,0,.20);
  overflow:hidden;
}

/* stars */
.star{
  position:absolute;
  width:7px; height:7px;
  border-radius:2px;
  background: rgba(255,255,255,.75);
  box-shadow: 0 0 0 3px rgba(255,255,255,.18);
  opacity:.55;
  pointer-events:none;
}

/* Plush puff base */
.puff{
  position:absolute;
  width:64px; height:64px;
  border-radius:50%;
  transform: translate(-50%,-50%);
  cursor:pointer;
  user-select:none;
  -webkit-tap-highlight-color: transparent;
  background: radial-gradient(circle at 35% 28%, #fff2f8 0 40%, var(--pink) 62%, var(--pink2) 100%);
  box-shadow:
    0 18px 34px rgba(0,0,0,.18),
    0 0 18px rgba(255,255,255,.25);
  border:1px solid rgba(0,0,0,.06);
  transition: transform .14s ease, opacity .18s ease;
}
.puff:active{ transform: translate(-50%,-50%) scale(.92); }

/* Real puff face */
.puff.real::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 38% 50%, #1f1f1f 0 4px, transparent 5px),
    radial-gradient(circle at 62% 50%, #1f1f1f 0 4px, transparent 5px),
    radial-gradient(circle at 40% 46%, rgba(255,255,255,.9) 0 1.4px, transparent 2px),
    radial-gradient(circle at 64% 46%, rgba(255,255,255,.9) 0 1.4px, transparent 2px),
    radial-gradient(circle at 50% 63%, rgba(255,120,170,.9) 0 6px, transparent 7px);
  opacity:.95;
}

/* curl */
.curl{
  position:absolute;
  width:18px; height:18px;
  top:-8px; left:22px;
  border:3px solid rgba(0,0,0,.12);
  border-left-color: transparent;
  border-bottom-color: transparent;
  border-radius: 50%;
  transform: rotate(20deg);
  opacity:.75;
}

/* Special puff */
.puff.special{ width:72px; height:72px; }
.puff.special .aura{
  position:absolute;
  inset:-18px;
  border-radius:50%;
  background: radial-gradient(circle, rgba(255,240,180,.95) 0 14%, rgba(255,240,180,.30) 34%, transparent 66%);
  animation:pulse 1.6s ease-in-out infinite;
  pointer-events:none;
}
@keyframes pulse{
  0%,100%{ transform: scale(.96); opacity:.75; }
  50%{ transform: scale(1.08); opacity:1; }
}

/* Decoys */
.puff.decoy{ opacity:.92; filter: saturate(1.08); }
.puff.decoy.face::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 38% 50%, rgba(0,0,0,.25) 0 3px, transparent 4px),
    radial-gradient(circle at 62% 50%, rgba(0,0,0,.25) 0 3px, transparent 4px);
  opacity:.55;
}
.puff.decoy.blank::before{ content:""; }

.puff.c1{ background: radial-gradient(circle at 35% 28%, #f6fff9 0 42%, #bff6d7 65%, #8fecc3 100%); }
.puff.c2{ background: radial-gradient(circle at 35% 28%, #f7fbff 0 42%, #cbe4ff 65%, #9cc7ff 100%); }
.puff.c3{ background: radial-gradient(circle at 35% 28%, #fffaf2 0 42%, #ffe2b8 65%, #ffc57a 100%); }
.puff.c4{ background: radial-gradient(circle at 35% 28%, #fdf6ff 0 42%, #e6c8ff 65%, #c79bff 100%); }

/* Bubble */
.bubbleBack{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  padding:18px;
  z-index:30;
  background: rgba(0,0,0,.18);
  backdrop-filter: blur(6px);
}
.bubble{
  width:min(520px, 100%);
  border-radius:26px;
  background: rgba(255,255,255,.90);
  border:1px solid rgba(0,0,0,.08);
  box-shadow: 0 20px 65px rgba(0,0,0,.22);
  padding:18px 18px 14px;
  text-align:center;
}
.msg{
  margin:0;
  font-size:20px;
  font-weight:950;
}
.heart{
  margin-top:8px;
  font-weight:950;
  font-size:18px;
  opacity:.85;
}
.sub{
  margin:10px 0 0;
  font-size:13px;
  font-weight:850;
  opacity:.72;
}
.actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:14px;
}
.ghost{
  background: rgba(255,255,255,.8);
  border:1px solid rgba(0,0,0,.10);
  box-shadow:none;
}

/* Confetti pop */
#confetti{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:40;
  display:none;
}
</style>
</head>

<body>
  <div class="hud">
    <div class="chip">found <span id="foundN">0</span>/8</div>
    <button class="btn" id="resetBtn">reset</button>
  </div>

  <div class="header">
    <div class="headerInner">
      <div class="title">Find the Hidden Mira Puffs</div>
      <div class="instruction">scroll left/right and tap each puff to unlock a message ✨</div>
    </div>
  </div>

  <div class="mapWrap" id="wrap">
    <div class="map" id="map"></div>
  </div>

  <canvas id="confetti"></canvas>

  <div class="bubbleBack" id="bubbleBack" role="dialog" aria-modal="true">
    <div class="bubble">
      <p class="msg" id="bubbleMsg"></p>
      <div class="heart" id="bubbleHeart" style="display:none;">♡</div>
      <p class="sub" id="bubbleSub"></p>
      <div class="actions">
        <button class="btn ghost" id="closeBtn">close</button>
        <button class="btn" id="nextBtn">keep hunting</button>
      </div>
    </div>
  </div>

<script>
(() => {
  const TOTAL = 8;
  const LS_KEY = "mira_puff_hunt_v5_found";

  const messages = [
    "you're adorable",
    "you're my mvp",
    "you're my favorite chaos",
    "i'm biased and rooting for you always..",
    "you're the risk i'm willing to take..",
    "pleasant distraction i can't ignore",
    "grateful to have you in my dm",
    "looking forward to those yummy hugs ♡"
  ];

  // Real puffs (special far right, separated)
  const realPositions = [
    {x: 220,  y: 220},
    {x: 560,  y: 360},
    {x: 980,  y: 260},
    {x: 1320, y: 380},
    {x: 1680, y: 260},
    {x: 1900, y: 420},
    {x: 1120, y: 520},
    {x: 2320, y: 320} // SPECIAL (separated)
  ];

  // More decoys (lots)
  const decoys = [
    // left cluster
    {x: 140, y: 420, cls:"c2 face"},
    {x: 260, y: 520, cls:"c3 blank"},
    {x: 320, y: 260, cls:"c1 face"},
    {x: 420, y: 320, cls:"c4 blank"},
    {x: 520, y: 220, cls:"c2 blank"},
    {x: 640, y: 520, cls:"c1 blank"},
    {x: 720, y: 280, cls:"c3 face"},
    {x: 820, y: 420, cls:"c4 face"},
    {x: 900, y: 220, cls:"c2 face"},
    {x: 460, y: 460, cls:"c3 face"},
    {x: 600, y: 340, cls:"c4 blank"},

    // mid
    {x: 1040, y: 380, cls:"c1 blank"},
    {x: 1100, y: 240, cls:"c4 face"},
    {x: 1200, y: 420, cls:"c3 blank"},
    {x: 1240, y: 300, cls:"c2 blank"},
    {x: 1400, y: 260, cls:"c1 face"},
    {x: 1460, y: 520, cls:"c4 blank"},
    {x: 1520, y: 340, cls:"c3 face"},
    {x: 1580, y: 460, cls:"c2 face"},
    {x: 1620, y: 520, cls:"c1 blank"},
    {x: 980,  y: 520, cls:"c2 face"},
    {x: 1300, y: 240, cls:"c3 blank"},
    {x: 1360, y: 520, cls:"c2 blank"},
    {x: 1500, y: 240, cls:"c4 face"},

    // right (pre-special)
    {x: 1760, y: 360, cls:"c4 face"},
    {x: 1820, y: 240, cls:"c3 blank"},
    {x: 1980, y: 260, cls:"c2 blank"},
    {x: 2040, y: 520, cls:"c1 face"},
    {x: 2100, y: 340, cls:"c3 face"},
    {x: 2160, y: 460, cls:"c4 blank"},
    {x: 2200, y: 240, cls:"c2 face"},
    {x: 1860, y: 520, cls:"c3 face"},
    {x: 1960, y: 520, cls:"c4 blank"},

    // special zone trolls
    {x: 2240, y: 520, cls:"c1 blank"},
    {x: 2260, y: 240, cls:"c4 face"},
    {x: 2360, y: 520, cls:"c3 blank"},
    {x: 2380, y: 260, cls:"c2 blank"},
    {x: 2400, y: 420, cls:"c1 face"},
    {x: 2280, y: 420, cls:"c3 face"},
    {x: 2400, y: 220, cls:"c2 face"}
  ];

  const map = document.getElementById("map");
  const wrap = document.getElementById("wrap");
  const foundN = document.getElementById("foundN");
  const resetBtn = document.getElementById("resetBtn");

  const bubbleBack = document.getElementById("bubbleBack");
  const bubbleMsg = document.getElementById("bubbleMsg");
  const bubbleSub = document.getElementById("bubbleSub");
  const bubbleHeart = document.getElementById("bubbleHeart");
  const closeBtn = document.getElementById("closeBtn");
  const nextBtn = document.getElementById("nextBtn");

  let foundSet = new Set();
  let pendingFinal = false;

  // Audio
  let audioCtx = null;
  function unlockAudio(){
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
  }
  function tone({freq=600, dur=0.12, type="sine", gain=0.22, glideTo=null}){
    if (!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (glideTo) o.frequency.exponentialRampToValueAtTime(glideTo, audioCtx.currentTime + dur);
    g.gain.setValueAtTime(gain, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + dur);
  }
  function popSound(isSpecial=false){
    tone({freq: isSpecial ? 520 : 460, glideTo: isSpecial ? 980 : 860, dur: 0.11, type:"sine", gain: 0.20});
    tone({freq: isSpecial ? 1200 : 1050, glideTo: isSpecial ? 900 : 820, dur: 0.07, type:"triangle", gain: 0.07});
  }
  function tinyNope(){
    tone({freq: 420, glideTo: 320, dur: 0.10, type:"sine", gain: 0.12});
  }
  function yeySound(){
    tone({freq: 523.25, dur: 0.10, type:"sine", gain: 0.14});
    setTimeout(() => tone({freq: 659.25, dur: 0.11, type:"sine", gain: 0.14}), 90);
    setTimeout(() => tone({freq: 783.99, dur: 0.14, type:"sine", gain: 0.14}), 190);
  }

  // Storage
  function save(){ localStorage.setItem(LS_KEY, JSON.stringify([...foundSet])); }
  function load(){
    try{
      const raw = localStorage.getItem(LS_KEY);
      if(!raw) return;
      const arr = JSON.parse(raw);
      if(Array.isArray(arr)) foundSet = new Set(arr);
    }catch(e){}
  }
  function updateCounter(){ foundN.textContent = String(foundSet.size); }

  // Bubble (supports <br>)
  function openBubble({msg, isSpecial=false, sub="", showKeep=true}){
    bubbleMsg.innerHTML = msg;
    bubbleSub.textContent = sub;
    bubbleHeart.style.display = isSpecial ? "block" : "none";
    nextBtn.style.display = showKeep ? "inline-block" : "none";
    bubbleBack.style.display = "flex";
  }
  function closeBubble(){
    bubbleBack.style.display = "none";

    // Show final message AFTER closing last puff message (prevents overlap)
    if (pendingFinal){
      pendingFinal = false;
      confettiPop();
      yeySound();
      openBubble({
        msg: "yey!! you found them all<br>(including me)!",
        sub: "ok… come collect your reward 😌",
        showKeep: false
      });
    }
  }
  closeBtn.addEventListener("click", closeBubble);
  nextBtn.addEventListener("click", closeBubble);
  bubbleBack.addEventListener("click", (e)=>{ if(e.target === bubbleBack) closeBubble(); });

  // Stars
  function addStars(){
    const h = map.clientHeight || 560;
    for(let i=0;i<46;i++){
      const s = document.createElement("div");
      s.className = "star";
      s.style.left = (60 + Math.random()*2280) + "px";
      s.style.top  = (60 + Math.random()*(h-120)) + "px";
      s.style.transform = `rotate(${Math.random()*60}deg)`;
      s.style.opacity = String(0.35 + Math.random()*0.35);
      map.appendChild(s);
    }
  }

  // Real puff
  function createRealPuff(i){
    const isSpecial = (i === TOTAL-1);
    const puff = document.createElement("div");
    puff.className = "puff real" + (isSpecial ? " special" : "");
    puff.style.left = realPositions[i].x + "px";
    puff.style.top  = realPositions[i].y + "px";
    puff.dataset.idx = String(i);

    const curl = document.createElement("div");
    curl.className = "curl";
    puff.appendChild(curl);

    if(isSpecial){
      const aura = document.createElement("div");
      aura.className = "aura";
      puff.appendChild(aura);
    }

    if(foundSet.has(i)) puff.style.display = "none";

    puff.addEventListener("click", () => {
      unlockAudio();
      onFindReal(puff);
    });

    return puff;
  }

  function onFindReal(puffEl){
    const idx = Number(puffEl.dataset.idx);
    if(foundSet.has(idx)) return;
    const isSpecial = (idx === TOTAL-1);

    foundSet.add(idx);
    save();
    updateCounter();

    popSound(isSpecial);

    puffEl.style.opacity = "0";
    puffEl.style.transform = "translate(-50%,-50%) scale(.86)";
    setTimeout(()=> puffEl.remove(), 160);

    openBubble({
      msg: messages[idx],
      isSpecial: isSpecial,
      sub: isSpecial ? "rare puff found." : "keep going… more hiding.",
      showKeep: true
    });

    if(foundSet.size === TOTAL){
      pendingFinal = true; // final will show after bubble is closed
    }
  }

  // Decoy puff
  function createDecoy(d){
    const puff = document.createElement("div");
    puff.className = "puff decoy " + d.cls;
    puff.style.left = d.x + "px";
    puff.style.top  = d.y + "px";

    puff.addEventListener("click", () => {
      unlockAudio();
      tinyNope();
      openBubble({ msg: "not this one 😌", sub: "keep hunting…", showKeep: true });
    });

    return puff;
  }

  function render(){
    map.innerHTML = "";
    addStars();

    // decoys first
    for(const d of decoys) map.appendChild(createDecoy(d));
    // real puffs last (so they can sit above decoys)
    for(let i=0;i<TOTAL;i++) map.appendChild(createRealPuff(i));
  }

  // Confetti POP (burst)
  const canvas = document.getElementById("confetti");
  const ctx = canvas.getContext("2d");

  function resizeCanvas(){
    canvas.width = Math.floor(window.innerWidth * devicePixelRatio);
    canvas.height = Math.floor(window.innerHeight * devicePixelRatio);
    ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  }
  window.addEventListener("resize", resizeCanvas);

  function confettiPop(){
    resizeCanvas();
    canvas.style.display = "block";

    const cx = window.innerWidth/2;
    const cy = window.innerHeight/2;

    const pieces = Array.from({length: 170}, () => {
      const angle = Math.random() * Math.PI * 2;
      const speed = 3 + Math.random() * 7;
      return {
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        size: 3 + Math.random() * 5,
        life: 55 + Math.random() * 25,
        rot: Math.random() * Math.PI,
        vr: (-0.25 + Math.random()*0.5)
      };
    });

    let frame = 0;
    function tick(){
      frame++;
      ctx.clearRect(0,0,window.innerWidth, window.innerHeight);

      for(const p of pieces){
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.05;
        p.vx *= 0.99;
        p.vy *= 0.99;
        p.rot += p.vr;
        p.life -= 1;

        if(p.life > 0){
          const alpha = Math.min(1, p.life / 40);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot);
          ctx.fillStyle = `hsl(${Math.floor(Math.random()*360)}, 85%, 75%)`;
          ctx.fillRect(-p.size, -p.size/2, p.size*2, p.size);
          ctx.restore();
        }
      }

      if(frame < 70){
        requestAnimationFrame(tick);
      }else{
        canvas.style.display = "none";
        ctx.clearRect(0,0,window.innerWidth, window.innerHeight);
      }
    }
    tick();
  }

  // Reset
  resetBtn.addEventListener("click", () => {
    localStorage.removeItem(LS_KEY);
    foundSet = new Set();
    pendingFinal = false;
    updateCounter();
    render();
    openBubble({ msg: "reset done.", sub: "puffs are hiding again 😌", showKeep: true });
  });

  // Init
  load();
  updateCounter();
  render();

  // Soft pan intro (horizontal)
  setTimeout(() => {
    wrap.scrollLeft = 40;
    setTimeout(() => wrap.scrollTo({left: 360, behavior: "smooth"}), 450);
  }, 250);

})();
</script>
</body>
  </html>
